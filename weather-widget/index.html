<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather Widget</title>
  <link rel="stylesheet" href="styles/style.css" />
</head>
<body>

  <div class="container">
    <div class="input-container">
      <form>
        <input type="text" class="zipcode" placeholder="zip — e.g. 10027 or 75001,fr">
        <button type="submit" class="search-button">Search</button>
      </form>
    </div>
    <div class="output-container">
      <!-- These start empty; main.js fills them in with the live weather. -->
      <h2 class="city_name"></h2>
      <p class="temperature"></p>
      <img src="" alt="weather icon">
    </div>
  </div>

  <!-- config.js holds your secret API key and is loaded first.
       main.js uses that key to fetch the weather. -->
  <script src="config.js"></script>
  <script src="javascript/main.js"></script>

</body>
</html>
