<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather Widget</title>
  <link rel="stylesheet" href="styles/style.css" />
</head>
<body>

  <div class="container">
    <div class="input-container">
      <form>
        <input type="text" class="zipcode" placeholder="type zipcode here">
        <button type="button" class="search-button">Search</button>
      </form>
    </div>
    <div class="output-container">
      <!-- City + temperature are hard-coded for now, just to test the styles.
           In the Data and APIs module these get filled in with live data. -->
      <h2 class="city_name">New York</h2>
      <p class="temperature">34</p>
    </div>
  </div>

  <!-- config.js holds your secret API key and is loaded first.
       main.js uses that key to fetch the weather. -->
  <script src="config.js"></script>
  <script src="javascript/main.js"></script>

</body>
</html>
